<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
            font-weight: 300;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .add-task-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        #new-task {
            flex: 2;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #new-task:focus {
            outline: none;
            border-color: #667eea;
        }

        .priority-select {
            flex: 1;
            min-width: 120px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            cursor: pointer;
        }

        .date-input {
            flex: 1;
            min-width: 150px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .add-btn {
            flex: 0.5;
            min-width: 100px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .add-btn:hover {
            background: #5a67d8;
        }

        .add-btn:active {
            transform: scale(0.98);
        }

        .filters-section {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f7f7f7;
            border-radius: 10px;
        }

        .sort-select {
            padding: 8px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .priority-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .priority-filter-btn {
            padding: 6px 12px;
            border: 2px solid transparent;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .priority-filter-btn.active {
            background: #667eea;
            color: white;
        }

        .priority-filter-btn[data-priority="all"] {
            border-color: #666;
        }
        .priority-filter-btn[data-priority="high"] { color: #e53e3e; }
        .priority-filter-btn[data-priority="medium"] { color: #ed8936; }
        .priority-filter-btn[data-priority="low"] { color: #48bb78; }
        .priority-filter-btn.active { color: white; }

        .task-stats {
            display: flex;
            gap: 15px;
            color: #666;
            font-size: 14px;
        }

        #task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f7f7f7;
            border-radius: 8px;
            border-left: 4px solid transparent;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .task-item.priority-high { border-left-color: #e53e3e; }
        .task-item.priority-medium { border-left-color: #ed8936; }
        .task-item.priority-low { border-left-color: #48bb78; }

        .task-item.completed {
            opacity: 0.7;
            background: #f0f0f0;
        }

        .task-checkbox {
            margin-right: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: #999;
        }

        .task-meta {
            display: flex;
            gap: 15px;
            font-size: 12px;
        }

        .priority-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
        }

        .priority-badge.high {
            background: #fed7d7;
            color: #e53e3e;
        }
        .priority-badge.medium {
            background: #feebc8;
            color: #ed8936;
        }
        .priority-badge.low {
            background: #c6f6d5;
            color: #48bb78;
        }

        .due-date {
            color: #666;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .due-date.overdue {
            color: #e53e3e;
            font-weight: 600;
        }

        .due-date.overdue::before {
            content: "⚠️";
            margin-right: 3px;
        }

        .due-date.today {
            color: #ed8936;
            font-weight: 600;
        }

        .due-date.tomorrow {
            color: #3182ce;
        }

        .task-actions {
            display: flex;
            gap: 5px;
        }

        .task-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .edit-btn {
            background: #4299e1;
            color: white;
        }

        .edit-btn:hover {
            background: #3182ce;
        }

        .delete-btn {
            background: #f56565;
            color: white;
        }

        .delete-btn:hover {
            background: #e53e3e;
        }

        .no-tasks {
            text-align: center;
            padding: 40px;
            color: #999;
            font-style: italic;
            background: #f7f7f7;
            border-radius: 8px;
        }

        .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .save-btn {
            background: #667eea;
            color: white;
        }

        .cancel-btn {
            background: #e0e0e0;
            color: #333;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            .add-task-section {
                flex-direction: column;
            }
            
            .filters-section {
                flex-direction: column;
                align-items: stretch;
            }
            
            .task-meta {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Mini Task Manager</h1>
        
        <div class="add-task-section">
            <input type="text" id="new-task" placeholder="Enter task title...">
            <select id="task-priority" class="priority-select">
                <option value="medium">Medium Priority</option>
                <option value="high">High Priority</option>
                <option value="low">Low Priority</option>
            </select>
            <input type="date" id="task-due-date" class="date-input">
            <button onclick="addTask()" class="add-btn">➕ Add Task</button>
        </div>

        <div class="filters-section">
            <div class="priority-filters">
                <button class="priority-filter-btn active" data-priority="all" onclick="filterTasks('all')">All</button>
                <button class="priority-filter-btn" data-priority="high" onclick="filterTasks('high')">High</button>
                <button class="priority-filter-btn" data-priority="medium" onclick="filterTasks('medium')">Medium</button>
                <button class="priority-filter-btn" data-priority="low" onclick="filterTasks('low')">Low</button>
            </div>
            
            <select id="sort-select" class="sort-select" onchange="changeSort()">
                <option value="priority-desc">Priority (High to Low)</option>
                <option value="priority-asc">Priority (Low to High)</option>
                <option value="due-date-asc">Due Date (Earliest)</option>
                <option value="due-date-desc">Due Date (Latest)</option>
                <option value="title-asc">Title (A-Z)</option>
            </select>

            <div class="task-stats" id="task-stats">
                <span>Total: <span id="total-tasks">0</span></span>
                <span>Completed: <span id="completed-tasks">0</span></span>
                <span>Overdue: <span id="overdue-tasks">0</span></span>
            </div>
        </div>

        <ul id="task-list"></ul>
    </div>

    <div id="edit-modal" class="edit-modal">
        <div class="modal-content">
            <h3>Edit Task</h3>
            <input type="text" id="edit-title" placeholder="Task title">
            <select id="edit-priority">
                <option value="high">High Priority</option>
                <option value="medium">Medium Priority</option>
                <option value="low">Low Priority</option>
            </select>
            <input type="date" id="edit-due-date">
            <div class="modal-buttons">
                <button onclick="saveEdit()" class="modal-btn save-btn">Save</button>
                <button onclick="closeEditModal()" class="modal-btn cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let currentEditId = null;
        let tasks = [];

        async function fetchTasks() {
            try {
                const res = await fetch('/tasks');
                tasks = await res.json();
                displayTasks();
            } catch (error) {
                console.error('Error fetching tasks:', error);
            }
        }

        function formatDate(dateString) {
            if (!dateString) return null;
            const date = new Date(dateString);
            return date.toISOString().split('T')[0];
        }

        function getDueDateStatus(dueDate) {
            if (!dueDate) return null;
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const taskDate = new Date(dueDate);
            taskDate.setHours(0, 0, 0, 0);
            
            const diffTime = taskDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays < 0) return 'overdue';
            if (diffDays === 0) return 'today';
            if (diffDays === 1) return 'tomorrow';
            return null;
        }

        function displayTasks() {
            const list = document.getElementById('task-list');
            const filteredTasks = tasks.filter(task => {
                if (currentFilter === 'all') return true;
                return task.priority === currentFilter;
            });

            // Apply sorting
            const sortBy = document.getElementById('sort-select').value;
            filteredTasks.sort((a, b) => {
                switch(sortBy) {
                    case 'priority-desc':
                        const priorityWeight = { high: 3, medium: 2, low: 1 };
                        return (priorityWeight[b.priority || 'medium'] || 0) - (priorityWeight[a.priority || 'medium'] || 0);
                    case 'priority-asc':
                        const priorityWeightAsc = { high: 3, medium: 2, low: 1 };
                        return (priorityWeightAsc[a.priority || 'medium'] || 0) - (priorityWeightAsc[b.priority || 'medium'] || 0);
                    case 'due-date-asc':
                        if (!a.dueDate) return 1;
                        if (!b.dueDate) return -1;
                        return new Date(a.dueDate) - new Date(b.dueDate);
                    case 'due-date-desc':
                        if (!a.dueDate) return 1;
                        if (!b.dueDate) return -1;
                        return new Date(b.dueDate) - new Date(a.dueDate);
                    case 'title-asc':
                        return (a.title || '').localeCompare(b.title || '');
                    default:
                        return 0;
                }
            });

            list.innerHTML = '';
            
            // Update stats
            const totalTasks = tasks.length;
            const completedTasks = tasks.filter(t => t.completed).length;
            const overdueTasks = tasks.filter(t => {
                if (!t.dueDate || t.completed) return false;
                return getDueDateStatus(t.dueDate) === 'overdue';
            }).length;
            
            document.getElementById('total-tasks').textContent = totalTasks;
            document.getElementById('completed-tasks').textContent = completedTasks;
            document.getElementById('overdue-tasks').textContent = overdueTasks;

            if (filteredTasks.length === 0) {
                list.innerHTML = '<li class="no-tasks">✨ No tasks found. Add a new task to get started!</li>';
                return;
            }

            filteredTasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item priority-${task.priority || 'medium'}`;
                if (task.completed) li.classList.add('completed');

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'task-checkbox';
                checkbox.checked = task.completed;
                checkbox.onclick = async (e) => {
                    e.stopPropagation();
                    await toggleTask(task.id);
                    fetchTasks();
                };

                const contentDiv = document.createElement('div');
                contentDiv.className = 'task-content';

                const titleDiv = document.createElement('div');
                titleDiv.className = 'task-title';
                titleDiv.textContent = task.title;

                const metaDiv = document.createElement('div');
                metaDiv.className = 'task-meta';

                const prioritySpan = document.createElement('span');
                prioritySpan.className = `priority-badge ${task.priority || 'medium'}`;
                prioritySpan.textContent = (task.priority || 'medium').toUpperCase();

                metaDiv.appendChild(prioritySpan);

                if (task.dueDate) {
                    const dueDateSpan = document.createElement('span');
                    dueDateSpan.className = `due-date ${getDueDateStatus(task.dueDate) || ''}`;
                    const dueDate = new Date(task.dueDate);
                    const formattedDate = dueDate.toLocaleDateString('en-US', { 
                        month: 'short', 
                        day: 'numeric',
                        year: 'numeric'
                    });
                    dueDateSpan.innerHTML = `📅 ${formattedDate}`;
                    metaDiv.appendChild(dueDateSpan);
                }

                contentDiv.appendChild(titleDiv);
                contentDiv.appendChild(metaDiv);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'task-actions';

                const editBtn = document.createElement('button');
                editBtn.className = 'task-btn edit-btn';
                editBtn.textContent = 'Edit';
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    openEditModal(task);
                };

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'task-btn delete-btn';
                deleteBtn.textContent = 'Delete';
                deleteBtn.onclick = async (e) => {
                    e.stopPropagation();
                    if (confirm('Are you sure you want to delete this task?')) {
                        await deleteTask(task.id);
                        fetchTasks();
                    }
                };

                actionsDiv.appendChild(editBtn);
                actionsDiv.appendChild(deleteBtn);

                li.appendChild(checkbox);
                li.appendChild(contentDiv);
                li.appendChild(actionsDiv);
                list.appendChild(li);
            });
        }

        async function addTask() {
            const input = document.getElementById('new-task');
            const priority = document.getElementById('task-priority').value;
            const dueDate = document.getElementById('task-due-date').value;
            
            if (!input.value.trim()) {
                alert('Please enter a task title');
                return;
            }

            try {
                await fetch('/tasks', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({
                        title: input.value,
                        priority: priority,
                        dueDate: dueDate || null
                    })
                });
                input.value = '';
                document.getElementById('task-due-date').value = '';
                fetchTasks();
            } catch (error) {
                console.error('Error adding task:', error);
            }
        }

        async function toggleTask(id) {
            try {
                await fetch(`/tasks/${id}`, { method: 'PUT' });
            } catch (error) {
                console.error('Error toggling task:', error);
            }
        }

        async function deleteTask(id) {
            try {
                await fetch(`/tasks/${id}`, { method: 'DELETE' });
            } catch (error) {
                console.error('Error deleting task:', error);
            }
        }

        function filterTasks(priority) {
            currentFilter = priority;
            document.querySelectorAll('.priority-filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            displayTasks();
        }

        function changeSort() {
            displayTasks();
        }

        function openEditModal(task) {
            currentEditId = task.id;
            document.getElementById('edit-title').value = task.title;
            document.getElementById('edit-priority').value = task.priority || 'medium';
            document.getElementById('edit-due-date').value = task.dueDate || '';
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
            currentEditId = null;
        }

        async function saveEdit() {
            if (!currentEditId) return;

            const title = document.getElementById('edit-title').value.trim();
            const priority = document.getElementById('edit-priority').value;
            const dueDate = document.getElementById('edit-due-date').value;

            if (!title) {
                alert('Please enter a task title');
                return;
            }

            try {
                await fetch(`/tasks/${currentEditId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        priority: priority,
                        dueDate: dueDate || null
                    })
                });
                closeEditModal();
                fetchTasks();
            } catch (error) {
                console.error('Error updating task:', error);
            }
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('edit-modal');
            if (event.target === modal) {
                closeEditModal();
            }
        };

        // Initial fetch
        fetchTasks();
    </script>
</body>
</html>
