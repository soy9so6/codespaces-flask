<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager · pink</title>
    <!-- Современные шрифты без засечек -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ===== CSS ПЕРЕМЕННЫЕ ===== */
        /* Определяем цветовую палитру для всего приложения */
        :root {
            --pink-50: #fff0f3;      /* Самый светлый розовый */
            --pink-100: #ffe4e8;     /* Очень светлый розовый */
            --pink-200: #ffd9e2;     /* Светлый розовый */
            --pink-300: #ffb6c1;     /* Нежный розовый */
            --pink-400: #ff69b4;     /* Яркий розовый */
            --pink-500: #ff1493;     /* Глубокий розовый */
            --pink-600: #d44e6c;     /* Темно-розовый */
            --pink-700: #b13e58;     /* Очень темный розовый */
            --shadow-sm: 0 2px 8px rgba(255, 182, 193, 0.2);    /* Маленькая тень */
            --shadow-md: 0 4px 15px rgba(255, 105, 180, 0.25);  /* Средняя тень */
            --shadow-lg: 0 20px 60px rgba(255, 105, 180, 0.3);  /* Большая тень */
            --gradient: linear-gradient(135deg, var(--pink-400), var(--pink-500));  /* Градиент */
            --gradient-soft: linear-gradient(135deg, #ff9a9e, #fad0c4);  /* Мягкий градиент */
        }

        /* ===== СБРОС И БАЗОВЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--gradient-soft);  /* Розовый градиентный фон */
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;  /* Сглаживание шрифтов */
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== ОСНОВНОЙ КОНТЕЙНЕР ===== */
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);  /* Полупрозрачный белый */
            backdrop-filter: blur(10px);  /* Эффект размытия фона */
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            padding: 32px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            font-weight: 700;
            font-size: 2.2rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Кнопки в шапке */
        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: white;
            border: 2px solid var(--pink-200);
            border-radius: 50px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--pink-600);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }

        .icon-btn:hover {
            background: var(--pink-100);
            border-color: var(--pink-400);
            transform: translateY(-2px);
        }

        /* ===== СЕКЦИЯ ДОБАВЛЕНИЯ ЗАДАЧИ ===== */
        .add-task-section {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            background: var(--pink-50);
            padding: 24px;
            border-radius: 24px;
            border: 2px solid var(--pink-200);
        }

        /* Обертка для поля ввода с иконкой */
        .input-wrapper {
            flex: 2;
            min-width: 250px;
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--pink-400);
            font-size: 18px;
        }

        #new-task {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 2px solid var(--pink-200);
            border-radius: 50px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            background: white;
        }

        #new-task:focus {
            outline: none;
            border-color: var(--pink-400);
            box-shadow: 0 0 0 4px rgba(255, 105, 180, 0.1);
        }

        /* Выпадающие списки */
        .priority-select, .date-input, .category-select {
            padding: 16px 20px;
            border: 2px solid var(--pink-200);
            border-radius: 50px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            background: white;
            cursor: pointer;
            color: var(--pink-600);
            font-weight: 500;
            min-width: 140px;
            transition: all 0.3s;
        }

        .priority-select:hover, .date-input:hover, .category-select:hover {
            border-color: var(--pink-400);
            background: var(--pink-50);
        }

        /* Кнопка добавления */
        .add-btn {
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 160px;
            justify-content: center;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* ===== СЕКЦИЯ ФИЛЬТРОВ ===== */
        .filters-section {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: white;
            border-radius: 20px;
            border: 2px solid var(--pink-200);
        }

        /* Группа кнопок фильтрации */
        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 8px 20px;
            border: 2px solid var(--pink-200);
            border-radius: 50px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            color: var(--pink-600);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-btn:hover {
            background: var(--pink-100);
            border-color: var(--pink-400);
        }

        .filter-btn.active {
            background: var(--gradient);
            color: white;
            border-color: transparent;
        }

        /* Выпадающий список сортировки */
        .sort-select {
            padding: 10px 24px;
            border: 2px solid var(--pink-200);
            border-radius: 50px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: white;
            cursor: pointer;
            color: var(--pink-600);
            font-weight: 500;
            min-width: 200px;
        }

        /* ===== СТРОКА ПОИСКА ===== */
        .search-bar {
            margin-bottom: 25px;
            position: relative;
        }

        .search-bar i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--pink-400);
            font-size: 18px;
            z-index: 1;
        }

        #search-input {
            width: 100%;
            padding: 16px 16px 16px 52px;
            border: 2px solid var(--pink-200);
            border-radius: 50px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            background: white;
            transition: all 0.3s;
        }

        #search-input:focus {
            outline: none;
            border-color: var(--pink-400);
            box-shadow: 0 0 0 4px rgba(255, 105, 180, 0.1);
        }

        /* ===== ПРОГРЕСС БАР ===== */
        .progress-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px solid var(--pink-200);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: var(--pink-600);
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: var(--pink-100);
            border-radius: 50px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient);
            border-radius: 50px;
            transition: width 0.3s ease;
        }

        /* ===== СТАТИСТИКА ЗАДАЧ ===== */
        .task-stats {
            display: flex;
            gap: 20px;
            background: white;
            padding: 12px 24px;
            border-radius: 50px;
            border: 2px solid var(--pink-200);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--pink-600);
            font-weight: 500;
            font-size: 14px;
        }

        .stat-item i {
            color: var(--pink-400);
            font-size: 16px;
        }

        .stat-value {
            font-weight: 700;
            color: var(--pink-500);
            margin-left: 4px;
        }

        /* ===== СПИСОК ЗАДАЧ ===== */
        #task-list {
            list-style: none;
        }

        /* ===== КАРТОЧКА ЗАДАЧИ ===== */
        .task-item {
            display: flex;
            align-items: center;
            padding: 20px;
            margin-bottom: 15px;
            background: white;
            border-radius: 20px;
            border-left: 6px solid transparent;
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow-sm);
            border: 2px solid transparent;
        }

        /* Анимация появления */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-item:hover {
            transform: translateX(8px) translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--pink-200);
        }

        /* Цвета левой полоски в зависимости от приоритета */
        .task-item.priority-high { border-left-color: var(--pink-500); }
        .task-item.priority-medium { border-left-color: var(--pink-400); }
        .task-item.priority-low { border-left-color: var(--pink-300); }

        /* Выполненная задача */
        .task-item.completed {
            opacity: 0.7;
            background: var(--pink-50);
        }

        /* Чекбокс */
        .task-checkbox {
            margin-right: 20px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--pink-400);
        }

        /* Контент задачи */
        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2d2d2d;
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.01em;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: var(--pink-300);
        }

        /* Мета-информация задачи */
        .task-meta {
            display: flex;
            gap: 15px;
            font-size: 13px;
            flex-wrap: wrap;
        }

        /* Бейдж приоритета */
        .priority-badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .priority-badge.high {
            background: var(--pink-100);
            color: var(--pink-500);
        }
        .priority-badge.medium {
            background: var(--pink-50);
            color: var(--pink-400);
        }
        .priority-badge.low {
            background: var(--pink-50);
            color: var(--pink-300);
        }

        /* Бейдж категории */
        .category-badge {
            padding: 4px 12px;
            border-radius: 50px;
            background: white;
            border: 2px solid var(--pink-200);
            color: var(--pink-600);
            font-weight: 500;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Дата выполнения */
        .due-date {
            color: #a0a0a0;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 50px;
            background: var(--pink-50);
        }

        .due-date.overdue {
            color: var(--pink-500);
            font-weight: 700;
            background: var(--pink-100);
        }

        .due-date.today {
            color: var(--pink-400);
            font-weight: 700;
            background: var(--pink-100);
        }

        .due-date.tomorrow {
            color: var(--pink-300);
            font-weight: 600;
            background: var(--pink-50);
        }

        /* Кнопки действий */
        .task-actions {
            display: flex;
            gap: 8px;
        }

        .task-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 2px solid var(--pink-200);
            color: var(--pink-400);
            font-size: 14px;
        }

        .task-btn:hover {
            background: var(--pink-100);
            transform: scale(1.1);
            border-color: var(--pink-400);
        }

        .task-btn.delete-btn:hover {
            background: var(--pink-500);
            border-color: var(--pink-500);
            color: white;
        }

        /* ===== СООБЩЕНИЕ ОБ ОТСУТСТВИИ ЗАДАЧ ===== */
        .no-tasks {
            text-align: center;
            padding: 60px 40px;
            color: var(--pink-300);
            background: white;
            border-radius: 24px;
            font-size: 18px;
            font-weight: 500;
            border: 2px dashed var(--pink-200);
            margin-top: 20px;
        }

        .no-tasks i {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--pink-400);
        }

        /* ===== МОДАЛЬНОЕ ОКНО ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 182, 193, 0.5);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 32px;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            border: 2px solid var(--pink-200);
        }

        .modal-content h2 {
            margin-bottom: 25px;
            color: var(--pink-600);
            font-family: 'Inter', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 2px solid var(--pink-200);
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.3s;
        }

        .modal-content textarea {
            min-height: 100px;
            resize: vertical;
        }

        .modal-content input:focus,
        .modal-content select:focus,
        .modal-content textarea:focus {
            outline: none;
            border-color: var(--pink-400);
            box-shadow: 0 0 0 4px rgba(255, 105, 180, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .save-btn {
            background: var(--gradient);
            color: white;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .cancel-btn {
            background: var(--pink-100);
            color: var(--pink-600);
            border: 2px solid var(--pink-200);
        }

        .cancel-btn:hover {
            background: var(--pink-200);
            transform: translateY(-2px);
        }

        /* ===== МАССОВЫЕ ДЕЙСТВИЯ ===== */
        .bulk-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding: 15px;
            background: var(--pink-50);
            border-radius: 16px;
            justify-content: flex-end;
        }

        .bulk-btn {
            padding: 10px 20px;
            border: 2px solid var(--pink-200);
            border-radius: 50px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: var(--pink-600);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .bulk-btn:hover {
            background: var(--pink-100);
            border-color: var(--pink-400);
        }

        .bulk-btn.danger:hover {
            background: var(--pink-500);
            border-color: var(--pink-500);
            color: white;
        }

        /* ===== АДАПТИВНЫЙ ДИЗАЙН ===== */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .add-task-section {
                flex-direction: column;
            }
            
            .filters-section {
                flex-direction: column;
                align-items: stretch;
            }
            
            .task-meta {
                flex-direction: column;
                gap: 8px;
            }
            
            .task-actions {
                flex-direction: column;
            }
            
            .task-btn {
                width: 100%;
                border-radius: 50px;
            }
        }

        /* ===== ПОЛЬЗОВАТЕЛЬСКАЯ ПОЛОСА ПРОКРУТКИ ===== */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--pink-50);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--gradient);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--pink-500);
        }

        /* ===== ЦВЕТ ВЫДЕЛЕНИЯ ===== */
        ::selection {
            background: var(--pink-300);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== ШАПКА САЙТА ===== -->
        <div class="header">
            <h1>
                <i class="fas fa-tasks"></i>
                Task Manager
            </h1>
            <div class="header-actions">
                <!-- Кнопки экспорта/импорта и смены темы -->
                <button class="icon-btn" onclick="exportTasks()">
                    <i class="fas fa-download"></i> Export
                </button>
                <button class="icon-btn" onclick="importTasks()">
                    <i class="fas fa-upload"></i> Import
                </button>
                <button class="icon-btn" onclick="toggleTheme()">
                    <i class="fas fa-palette"></i> Theme
                </button>
            </div>
        </div>

        <!-- ===== ФОРМА ДОБАВЛЕНИЯ НОВОЙ ЗАДАЧИ ===== -->
        <div class="add-task-section">
            <div class="input-wrapper">
                <i class="fas fa-pencil-alt"></i>
                <input type="text" id="new-task" placeholder="What needs to be done?">
            </div>
            
            <!-- Выбор приоритета -->
            <select id="task-priority" class="priority-select">
                <option value="medium">🎯 Medium Priority</option>
                <option value="high">🔥 High Priority</option>
                <option value="low">🌱 Low Priority</option>
            </select>

            <!-- Выбор категории (НОВЫЙ ФУНКЦИОНАЛ) -->
            <select id="task-category" class="category-select">
                <option value="personal">👤 Personal</option>
                <option value="work">💼 Work</option>
                <option value="shopping">🛒 Shopping</option>
                <option value="health">❤️ Health</option>
                <option value="other">📌 Other</option>
            </select>
            
            <!-- Выбор даты выполнения -->
            <input type="date" id="task-due-date" class="date-input">
            
            <!-- Кнопка добавления -->
            <button onclick="addTask()" class="add-btn">
                <i class="fas fa-plus-circle"></i> Add Task
            </button>
        </div>

        <!-- ===== СТРОКА ПОИСКА (НОВЫЙ ФУНКЦИОНАЛ) ===== -->
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Search tasks..." oninput="filterTasks()">
        </div>

        <!-- ===== ПРОГРЕСС ВЫПОЛНЕНИЯ (НОВЫЙ ФУНКЦИОНАЛ) ===== -->
        <div class="progress-section">
            <div class="progress-header">
                <span><i class="fas fa-chart-line"></i> Overall Progress</span>
                <span id="progress-percentage">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <!-- ===== ПАНЕЛЬ ФИЛЬТРАЦИИ И СОРТИРОВКИ ===== -->
        <div class="filters-section">
            <div class="filter-group">
                <!-- Кнопки фильтрации по статусу и приоритету -->
                <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">
                    <i class="fas fa-list-ul"></i> All
                </button>
                <button class="filter-btn" data-filter="high" onclick="setFilter('high')">
                    <i class="fas fa-exclamation-circle"></i> High
                </button>
                <button class="filter-btn" data-filter="medium" onclick="setFilter('medium')">
                    <i class="fas fa-minus-circle"></i> Medium
                </button>
                <button class="filter-btn" data-filter="low" onclick="setFilter('low')">
                    <i class="fas fa-check-circle"></i> Low
                </button>
                <button class="filter-btn" data-filter="active" onclick="setFilter('active')">
                    <i class="fas fa-hourglass-half"></i> Active
                </button>
                <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">
                    <i class="fas fa-check-double"></i> Completed
                </button>
            </div>
            
            <!-- Выбор типа сортировки -->
            <select id="sort-select" class="sort-select" onchange="changeSort()">
                <option value="priority-desc">⬇️ Priority (High first)</option>
                <option value="priority-asc">⬆️ Priority (Low first)</option>
                <option value="due-date-asc">📅 Due date (Earliest)</option>
                <option value="due-date-desc">📅 Due date (Latest)</option>
                <option value="title-asc">🔤 Title (A-Z)</option>
                <option value="category">📁 By category</option>
                <option value="created">🕒 Recently created</option>
            </select>

            <!-- Статистика задач -->
            <div class="task-stats">
                <div class="stat-item">
                    <i class="fas fa-tasks"></i>
                    <span>Total: <span class="stat-value" id="total-tasks">0</span></span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-check-circle"></i>
                    <span>Done: <span class="stat-value" id="completed-tasks">0</span></span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Overdue: <span class="stat-value" id="overdue-tasks">0</span></span>
                </div>
            </div>
        </div>

        <!-- ===== СПИСОК ЗАДАЧ ===== -->
        <ul id="task-list"></ul>

        <!-- ===== МАССОВЫЕ ДЕЙСТВИЯ (НОВЫЙ ФУНКЦИОНАЛ) ===== -->
        <div class="bulk-actions">
            <button class="bulk-btn" onclick="markAllCompleted()">
                <i class="fas fa-check-double"></i> Mark all as done
            </button>
            <button class="bulk-btn" onclick="clearCompleted()">
                <i class="fas fa-trash-alt"></i> Clear completed
            </button>
            <button class="bulk-btn danger" onclick="deleteAllTasks()">
                <i class="fas fa-trash"></i> Delete all
            </button>
        </div>
    </div>

    <!-- ===== МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ ===== -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-edit"></i> Edit Task</h2>
            <input type="text" id="edit-title" placeholder="Task title">
            <textarea id="edit-description" placeholder="Description (optional)"></textarea>
            <select id="edit-priority">
                <option value="high">🔥 High Priority</option>
                <option value="medium">🎯 Medium Priority</option>
                <option value="low">🌱 Low Priority</option>
            </select>
            <select id="edit-category">
                <option value="personal">👤 Personal</option>
                <option value="work">💼 Work</option>
                <option value="shopping">🛒 Shopping</option>
                <option value="health">❤️ Health</option>
                <option value="other">📌 Other</option>
            </select>
            <input type="date" id="edit-due-date">
            <div class="modal-buttons">
                <button onclick="saveEdit()" class="modal-btn save-btn">
                    <i class="fas fa-save"></i> Save
                </button>
                <button onclick="closeModal()" class="modal-btn cancel-btn">
                    <i class="fas fa-times"></i> Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- ===== МОДАЛЬНОЕ ОКНО ДЕТАЛЕЙ ЗАДАЧИ (НОВЫЙ ФУНКЦИОНАЛ) ===== -->
    <div id="details-modal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-info-circle"></i> Task Details</h2>
            <div id="task-details-content"></div>
            <div class="modal-buttons">
                <button onclick="closeDetailsModal()" class="modal-btn cancel-btn">
                    <i class="fas fa-times"></i> Close
                </button>
            </div>
        </div>
    </div>

    <script>
        // ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
        let tasks = [];              // Массив всех задач
        let currentFilter = 'all';    // Текущий выбранный фильтр
        let currentEditId = null;     // ID редактируемой задачи
        let searchTerm = '';          // Термин для поиска

        // ===== ЗАГРУЗКА ЗАДАЧ С СЕРВЕРА =====
        async function fetchTasks() {
            try {
                const res = await fetch('/tasks');
                tasks = await res.json();
                displayTasks();
            } catch (error) {
                console.error('Error fetching tasks:', error);
            }
        }

        // ===== ОПРЕДЕЛЕНИЕ СТАТУСА СРОКА =====
        // Возвращает: 'overdue' (просрочено), 'today' (сегодня), 'tomorrow' (завтра) или null
        function getDueDateStatus(dueDate) {
            if (!dueDate) return null;
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const taskDate = new Date(dueDate);
            taskDate.setHours(0, 0, 0, 0);
            
            const diffTime = taskDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays < 0) return 'overdue';
            if (diffDays === 0) return 'today';
            if (diffDays === 1) return 'tomorrow';
            return null;
        }

        // ===== ОБНОВЛЕНИЕ ПРОГРЕСС-БАРА =====
        function updateProgress() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);
            
            document.getElementById('progress-percentage').textContent = percentage + '%';
            document.getElementById('progress-bar').style.width = percentage + '%';
        }

        // ===== ОТОБРАЖЕНИЕ ЗАДАЧ =====
        function displayTasks() {
            const list = document.getElementById('task-list');
            
            // Применяем фильтрацию
            let filteredTasks = tasks.filter(task => {
                // Фильтр по поиску
                if (searchTerm && !task.title.toLowerCase().includes(searchTerm.toLowerCase())) {
                    return false;
                }
                
                // Фильтр по приоритету/статусу
                if (currentFilter === 'all') return true;
                if (currentFilter === 'active') return !task.completed;
                if (currentFilter === 'completed') return task.completed;
                return task.priority === currentFilter;
            });

            // ===== СОРТИРОВКА ЗАДАЧ =====
            const sortBy = document.getElementById('sort-select').value;
            filteredTasks.sort((a, b) => {
                switch(sortBy) {
                    case 'priority-desc':
                        // Сортировка от высокого приоритета к низкому
                        const priorityWeight = { high: 3, medium: 2, low: 1 };
                        return (priorityWeight[b.priority || 'medium'] || 0) - (priorityWeight[a.priority || 'medium'] || 0);
                    
                    case 'priority-asc':
                        // Сортировка от низкого приоритета к высокому
                        const priorityWeightAsc = { high: 3, medium: 2, low: 1 };
                        return (priorityWeightAsc[a.priority || 'medium'] || 0) - (priorityWeightAsc[b.priority || 'medium'] || 0);
                    
                    case 'due-date-asc':
                        // Сортировка по дате (сначала ближайшие)
                        if (!a.dueDate) return 1;
                        if (!b.dueDate) return -1;
                        return new Date(a.dueDate) - new Date(b.dueDate);
                    
                    case 'due-date-desc':
                        // Сортировка по дате (сначала поздние)
                        if (!a.dueDate) return 1;
                        if (!b.dueDate) return -1;
                        return new Date(b.dueDate) - new Date(a.dueDate);
                    
                    case 'title-asc':
                        // Алфавитная сортировка
                        return (a.title || '').localeCompare(b.title || '');
                    
                    case 'category':
                        // Сортировка по категории
                        return (a.category || '').localeCompare(b.category || '');
                    
                    case 'created':
                        // Сортировка по дате создания (новые сначала)
                        return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
                    
                    default:
                        return 0;
                }
            });

            list.innerHTML = '';
            
            // ===== ОБНОВЛЕНИЕ СТАТИСТИКИ =====
            const totalTasks = tasks.length;
            const completedTasks = tasks.filter(t => t.completed).length;
            const overdueTasks = tasks.filter(t => {
                if (!t.dueDate || t.completed) return false;
                return getDueDateStatus(t.dueDate) === 'overdue';
            }).length;
            
            document.getElementById('total-tasks').textContent = totalTasks;
            document.getElementById('completed-tasks').textContent = completedTasks;
            document.getElementById('overdue-tasks').textContent = overdueTasks;
            
            // Обновляем прогресс
            updateProgress();

            // Сообщение, если нет задач
            if (filteredTasks.length === 0) {
                list.innerHTML = `
                    <li class="no-tasks">
                        <i class="fas fa-smile-wink"></i>
                        <br>No tasks found. Add a new task to get started!
                    </li>`;
                return;
            }

            // ===== СОЗДАНИЕ HTML ДЛЯ КАЖДОЙ ЗАДАЧИ =====
            filteredTasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item priority-${task.priority || 'medium'}`;
                if (task.completed) li.classList.add('completed');
                li.onclick = () => showTaskDetails(task);  // Просмотр деталей по клику

                // Чекбокс для отметки выполнения
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'task-checkbox';
                checkbox.checked = task.completed;
                checkbox.onclick = async (e) => {
                    e.stopPropagation();
                    await toggleTask(task.id);
                    fetchTasks();
                };

                // Контейнер с контентом задачи
                const contentDiv = document.createElement('div');
                contentDiv.className = 'task-content';

                // Название задачи
                const titleDiv = document.createElement('div');
                titleDiv.className = 'task-title';
                titleDiv.textContent = task.title;

                // Мета-информация
                const metaDiv = document.createElement('div');
                metaDiv.className = 'task-meta';

                // Значок приоритета
                const prioritySpan = document.createElement('span');
                prioritySpan.className = `priority-badge ${task.priority || 'medium'}`;
                
                const priorityIcons = {
                    'high': '🔥',
                    'medium': '🎯',
                    'low': '🌱'
                };
                
                prioritySpan.innerHTML = `${priorityIcons[task.priority || 'medium']} ${(task.priority || 'medium').toUpperCase()}`;
                metaDiv.appendChild(prioritySpan);

                // Значок категории (НОВЫЙ ФУНКЦИОНАЛ)
                if (task.category) {
                    const categorySpan = document.createElement('span');
                    categorySpan.className = 'category-badge';
                    
                    const categoryIcons = {
                        'personal': '👤',
                        'work': '💼',
                        'shopping': '🛒',
                        'health': '❤️',
                        'other': '📌'
                    };
                    
                    categorySpan.innerHTML = `${categoryIcons[task.category] || '📌'} ${task.category}`;
                    metaDiv.appendChild(categorySpan);
                }

                // Описание (если есть)
                if (task.description) {
                    const descSpan = document.createElement('span');
                    descSpan.className = 'category-badge';
                    descSpan.innerHTML = `📝 ${task.description.substring(0, 20)}${task.description.length > 20 ? '...' : ''}`;
                    metaDiv.appendChild(descSpan);
                }

                // Дата выполнения со статусом
                if (task.dueDate) {
                    const dueDateSpan = document.createElement('span');
                    const status = getDueDateStatus(task.dueDate);
                    dueDateSpan.className = `due-date ${status || ''}`;
                    
                    const dueDate = new Date(task.dueDate);
                    const formattedDate = dueDate.toLocaleDateString('en-US', { 
                        month: 'short', 
                        day: 'numeric'
                    });
                    
                    let icon = '📅';
                    let statusText = '';
                    
                    if (status === 'overdue') {
                        icon = '⚠️';
                        statusText = 'Overdue: ';
                    } else if (status === 'today') {
                        icon = '🔴';
                        statusText = 'Today: ';
                    } else if (status === 'tomorrow') {
                        icon = '🟡';
                        statusText = 'Tomorrow: ';
                    }
                    
                    dueDateSpan.innerHTML = `${icon} ${statusText}${formattedDate}`;
                    metaDiv.appendChild(dueDateSpan);
                }

                contentDiv.appendChild(titleDiv);
                contentDiv.appendChild(metaDiv);

                // Кнопки действий
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'task-actions';

                // Кнопка редактирования
                const editBtn = document.createElement('button');
                editBtn.className = 'task-btn edit-btn';
                editBtn.innerHTML = '<i class="fas fa-edit"></i>';
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    openEditModal(task);
                };

                // Кнопка удаления
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'task-btn delete-btn';
                deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
                deleteBtn.onclick = async (e) => {
                    e.stopPropagation();
                    if (confirm('Are you sure you want to delete this task?')) {
                        await deleteTask(task.id);
                        fetchTasks();
                    }
                };

                actionsDiv.appendChild(editBtn);
                actionsDiv.appendChild(deleteBtn);

                li.appendChild(checkbox);
                li.appendChild(contentDiv);
                li.appendChild(actionsDiv);
                list.appendChild(li);
            });
        }

        // ===== ДОБАВЛЕНИЕ НОВОЙ ЗАДАЧИ =====
        async function addTask() {
            const input = document.getElementById('new-task');
            const priority = document.getElementById('task-priority').value;
            const category = document.getElementById('task-category').value;
            const dueDate = document.getElementById('task-due-date').value;
            
            if (!input.value.trim()) {
                alert('Please enter a task title');
                return;
            }

            try {
                await fetch('/tasks', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({
                        title: input.value,
                        priority: priority,
                        category: category,
                        dueDate: dueDate || null,
                        createdAt: new Date().toISOString()
                    })
                });
                
                input.value = '';
                document.getElementById('task-due-date').value = '';
                fetchTasks();
            } catch (error) {
                console.error('Error adding task:', error);
            }
        }

        // ===== ПЕРЕКЛЮЧЕНИЕ СТАТУСА ВЫПОЛНЕНИЯ =====
        async function toggleTask(id) {
            try {
                await fetch(`/tasks/${id}`, { method: 'PUT' });
            } catch (error) {
                console.error('Error toggling task:', error);
            }
        }

        // ===== УДАЛЕНИЕ ЗАДАЧИ =====
        async function deleteTask(id) {
            try {
                await fetch(`/tasks/${id}`, { method: 'DELETE' });
            } catch (error) {
                console.error('Error deleting task:', error);
            }
        }

        // ===== УСТАНОВКА ФИЛЬТРА =====
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            displayTasks();
        }

        // ===== ФИЛЬТРАЦИЯ ПО ПОИСКУ =====
        function filterTasks() {
            searchTerm = document.getElementById('search-input').value;
            displayTasks();
        }

        // ===== ИЗМЕНЕНИЕ СОРТИРОВКИ =====
        function changeSort() {
            displayTasks();
        }

        // ===== ОТКРЫТИЕ МОДАЛЬНОГО ОКНА РЕДАКТИРОВАНИЯ =====
        function openEditModal(task) {
            currentEditId = task.id;
            document.getElementById('edit-title').value = task.title;
            document.getElementById('edit-description').value = task.description || '';
            document.getElementById('edit-priority').value = task.priority || 'medium';
            document.getElementById('edit-category').value = task.category || 'personal';
            document.getElementById('edit-due-date').value = task.dueDate || '';
            document.getElementById('edit-modal').style.display = 'flex';
        }

        // ===== ЗАКРЫТИЕ МОДАЛЬНОГО ОКНА =====
        function closeModal() {
            document.getElementById('edit-modal').style.display = 'none';
            currentEditId = null;
        }

        // ===== СОХРАНЕНИЕ ИЗМЕНЕНИЙ =====
        async function saveEdit() {
            if (!currentEditId) return;

            const title = document.getElementById('edit-title').value.trim();
            const description = document.getElementById('edit-description').value.trim();
            const priority = document.getElementById('edit-priority').value;
            const category = document.getElementById('edit-category').value;
            const dueDate = document.getElementById('edit-due-date').value;

            if (!title) {
                alert('Please enter a task title');
                return;
            }

            try {
                await fetch(`/tasks/${currentEditId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        description: description || null,
                        priority: priority,
                        category: category,
                        dueDate: dueDate || null
                    })
                });
                closeModal();
                fetchTasks();
            } catch (error) {
                console.error('Error updating task:', error);
            }
        }

        // ===== ПОКАЗ ДЕТАЛЕЙ ЗАДАЧИ (НОВЫЙ ФУНКЦИОНАЛ) =====
        function showTaskDetails(task) {
            const content = document.getElementById('task-details-content');
            
            const dueDate = task.dueDate ? new Date(task.dueDate).toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            }) : 'No due date';
            
            const createdDate = task.createdAt ? new Date(task.createdAt).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            }) : 'Unknown';
            
            content.innerHTML = `
                <div style="margin-bottom: 20px;">
                    <h3 style="color: var(--pink-600); margin-bottom: 10px;">${task.title}</h3>
                    
                    <div style="background: var(--pink-50); padding: 20px; border-radius: 16px;">
                        <p style="margin-bottom: 10px;">
                            <i class="fas fa-align-left" style="color: var(--pink-400); width: 20px;"></i>
                            <strong>Description:</strong> ${task.description || 'No description'}
                        </p>
                        <p style="margin-bottom: 10px;">
                            <i class="fas fa-flag" style="color: var(--pink-400); width: 20px;"></i>
                            <strong>Priority:</strong> 
                            <span class="priority-badge ${task.priority || 'medium'}">${task.priority || 'medium'}</span>
                        </p>
                        <p style="margin-bottom: 10px;">
                            <i class="fas fa-folder" style="color: var(--pink-400); width: 20px;"></i>
                            <strong>Category:</strong> ${task.category || 'other'}
                        </p>
                        <p style="margin-bottom: 10px;">
                            <i class="fas fa-calendar" style="color: var(--pink-400); width: 20px;"></i>
                            <strong>Due date:</strong> ${dueDate}
                        </p>
                        <p style="margin-bottom: 10px;">
                            <i class="fas fa-clock" style="color: var(--pink-400); width: 20px;"></i>
                            <strong>Created:</strong> ${createdDate}
                        </p>
                        <p>
                            <i class="fas fa-check-circle" style="color: var(--pink-400); width: 20px;"></i>
                            <strong>Status:</strong> ${task.completed ? '✅ Completed' : '⏳ In progress'}
                        </p>
                    </div>
                </div>
            `;
            
            document.getElementById('details-modal').style.display = 'flex';
        }

        // ===== ЗАКРЫТИЕ МОДАЛЬНОГО ОКНА ДЕТАЛЕЙ =====
        function closeDetailsModal() {
            document.getElementById('details-modal').style.display = 'none';
        }

        // ===== МАССОВЫЕ ДЕЙСТВИЯ (НОВЫЙ ФУНКЦИОНАЛ) =====
        
        // Отметить все задачи как выполненные
        async function markAllCompleted() {
            if (!confirm('Mark all tasks as completed?')) return;
            
            for (const task of tasks) {
                if (!task.completed) {
                    await toggleTask(task.id);
                }
            }
            fetchTasks();
        }

        // Очистить выполненные задачи
        async function clearCompleted() {
            if (!confirm('Delete all completed tasks?')) return;
            
            const completedTasks = tasks.filter(t => t.completed);
            for (const task of completedTasks) {
                await deleteTask(task.id);
            }
            fetchTasks();
        }

        // Удалить все задачи
        async function deleteAllTasks() {
            if (!confirm('⚠️ Are you sure you want to delete ALL tasks? This cannot be undone!')) return;
            
            for (const task of tasks) {
                await deleteTask(task.id);
            }
            fetchTasks();
        }

        // ===== ЭКСПОРТ ЗАДАЧ (НОВЫЙ ФУНКЦИОНАЛ) =====
        function exportTasks() {
            const dataStr = JSON.stringify(tasks, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `tasks-export-${new Date().toISOString().slice(0,10)}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        // ===== ИМПОРТ ЗАДАЧ (НОВЫЙ ФУНКЦИОНАЛ) =====
        function importTasks() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            
            input.onchange = async (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                
                reader.onload = async (e) => {
                    try {
                        const importedTasks = JSON.parse(e.target.result);
                        
                        for (const task of importedTasks) {
                            await fetch('/tasks', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    title: task.title,
                                    priority: task.priority,
                                    category: task.category,
                                    dueDate: task.dueDate,
                                    description: task.description
                                })
                            });
                        }
                        
                        fetchTasks();
                        alert('Tasks imported successfully!');
                    } catch (error) {
                        alert('Error importing tasks. Please check the file format.');
                    }
                };
                
                reader.readAsText(file);
            };
            
            input.click();
        }

        // ===== СМЕНА ТЕМЫ (ДЕМО-ФУНКЦИЯ) =====
        function toggleTheme() {
            alert('Theme toggle is a demo feature! In a real app, you could switch between color schemes.');
            // Здесь можно добавить логику смены темы
        }

        // ===== ЗАКРЫТИЕ МОДАЛЬНЫХ ОКОН ПРИ КЛИКЕ ВНЕ ИХ =====
        window.onclick = function(event) {
            const editModal = document.getElementById('edit-modal');
            const detailsModal = document.getElementById('details-modal');
            
            if (event.target === editModal) {
                closeModal();
            }
            if (event.target === detailsModal) {
                closeDetailsModal();
            }
        };

        // ===== ПЕРВОНАЧАЛЬНАЯ ЗАГРУЗКА =====
        fetchTasks();
    </script>
</body>
</html>
