<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Менеджер задач</title>
    <!-- Подключаем красивые шрифты из Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== СТИЛИ ДЛЯ BODY ===== */
        /* Нежный розовый градиентный фон */
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* ===== КОНТЕЙНЕР ===== */
        /* Белая карточка с задачами по центру */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(255, 120, 150, 0.3);
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* ===== ЗАГОЛОВОК ===== */
        h1 {
            font-family: 'Playfair Display', serif;
            color: #d44e6c;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.8em;
            font-weight: 400;
            border-bottom: 3px solid #ffb6c1;
            padding-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.3);
        }

        /* ===== СЕКЦИЯ ДОБАВЛЕНИЯ ЗАДАЧИ ===== */
        .add-task-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        /* Поле ввода названия задачи */
        #new-task {
            flex: 2;
            min-width: 200px;
            padding: 15px 20px;
            border: 2px solid #ffe4e6;
            border-radius: 50px;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s;
            background: white;
        }

        #new-task:focus {
            outline: none;
            border-color: #ff69b4;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
        }

        #new-task::placeholder {
            color: #ffb6c1;
            font-style: italic;
        }

        /* Выпадающий список для выбора приоритета */
        .priority-select {
            flex: 1;
            min-width: 120px;
            padding: 15px 20px;
            border: 2px solid #ffe4e6;
            border-radius: 50px;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            background: white;
            cursor: pointer;
            color: #d44e6c;
            font-weight: 500;
        }

        /* Поле для выбора даты */
        .date-input {
            flex: 1;
            min-width: 150px;
            padding: 15px 20px;
            border: 2px solid #ffe4e6;
            border-radius: 50px;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            color: #d44e6c;
        }

        /* Кнопка добавления задачи */
        .add-btn {
            flex: 0.5;
            min-width: 100px;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        }

        .add-btn:hover {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.4);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        /* ===== СЕКЦИЯ ФИЛЬТРОВ ===== */
        .filters-section {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 228, 230, 0.5);
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        /* Выпадающий список для выбора типа сортировки */
        .sort-select {
            padding: 10px 20px;
            border: 2px solid #ffb6c1;
            border-radius: 50px;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            background: white;
            cursor: pointer;
            color: #d44e6c;
            font-weight: 500;
        }

        /* Контейнер для кнопок фильтрации по приоритету */
        .priority-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Кнопки фильтрации по приоритету */
        .priority-filter-btn {
            padding: 8px 20px;
            border: 2px solid transparent;
            border-radius: 50px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(255, 182, 193, 0.2);
        }

        .priority-filter-btn.active {
            background: #ff69b4;
            color: white;
            border-color: #ff1493;
        }

        .priority-filter-btn[data-priority="all"] { 
            border-color: #ffb6c1;
            color: #d44e6c;
        }
        .priority-filter-btn[data-priority="high"] { 
            color: #ff1493;
        }
        .priority-filter-btn[data-priority="medium"] { 
            color: #ff69b4;
        }
        .priority-filter-btn[data-priority="low"] { 
            color: #ffb6c1;
        }
        .priority-filter-btn.active { 
            color: white; 
        }

        /* ===== СТАТИСТИКА ЗАДАЧ ===== */
        .task-stats {
            display: flex;
            gap: 20px;
            color: #d44e6c;
            font-size: 14px;
            font-weight: 500;
            background: white;
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(255, 182, 193, 0.2);
        }

        /* ===== СПИСОК ЗАДАЧ ===== */
        #task-list {
            list-style: none;
        }

        /* ===== КАРТОЧКА ЗАДАЧИ ===== */
        .task-item {
            display: flex;
            align-items: center;
            padding: 20px;
            margin-bottom: 15px;
            background: white;
            border-radius: 20px;
            border-left: 6px solid transparent;
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.2);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-item:hover {
            transform: translateX(8px) translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.25);
        }

        /* ===== ЦВЕТОВАЯ ИНДИКАЦИЯ ПРИОРИТЕТОВ ===== */
        .task-item.priority-high { border-left-color: #ff1493; }
        .task-item.priority-medium { border-left-color: #ff69b4; }
        .task-item.priority-low { border-left-color: #ffb6c1; }

        .task-item.completed {
            opacity: 0.7;
            background: #fff0f3;
        }

        /* Чекбокс для отметки выполнения */
        .task-checkbox {
            margin-right: 20px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #ff69b4;
        }

        /* Контейнер с контентом задачи */
        .task-content {
            flex: 1;
        }

        /* Название задачи */
        .task-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #4a4a4a;
            font-family: 'Montserrat', sans-serif;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: #ffb6c1;
        }

        /* ===== МЕТА-ИНФОРМАЦИЯ ЗАДАЧИ ===== */
        .task-meta {
            display: flex;
            gap: 15px;
            font-size: 13px;
        }

        /* Значок приоритета */
        .priority-badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .priority-badge.high {
            background: #ffe4e8;
            color: #ff1493;
        }
        .priority-badge.medium {
            background: #fff0f3;
            color: #ff69b4;
        }
        .priority-badge.low {
            background: #fff5f7;
            color: #ffb6c1;
        }

        /* ===== ВИЗУАЛИЗАЦИЯ СРОКОВ ===== */
        .due-date {
            color: #a0a0a0;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }

        .due-date.overdue {
            color: #ff1493;
            font-weight: 700;
        }

        .due-date.overdue::before {
            content: "⚠️";
            margin-right: 5px;
            font-size: 14px;
        }

        .due-date.today {
            color: #ff69b4;
            font-weight: 700;
        }

        .due-date.today::before {
            content: "🔴";
            margin-right: 5px;
        }

        .due-date.tomorrow {
            color: #ffb6c1;
            font-weight: 600;
        }

        .due-date.tomorrow::before {
            content: "🟡";
            margin-right: 5px;
        }

        /* ===== КНОПКИ ДЕЙСТВИЙ ===== */
        .task-actions {
            display: flex;
            gap: 8px;
        }

        .task-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .edit-btn {
            background: #fff0f3;
            color: #ff69b4;
            border: 1px solid #ffb6c1;
        }

        .edit-btn:hover {
            background: #ffe4e8;
            transform: scale(1.05);
        }

        .delete-btn {
            background: #ffe4e8;
            color: #ff1493;
            border: 1px solid #ffb6c1;
        }

        .delete-btn:hover {
            background: #ffd9e2;
            transform: scale(1.05);
        }

        /* ===== СООБЩЕНИЕ ОБ ОТСУТСТВИИ ЗАДАЧ ===== */
        .no-tasks {
            text-align: center;
            padding: 50px;
            color: #ffb6c1;
            font-style: italic;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            font-size: 18px;
            font-family: 'Playfair Display', serif;
            border: 2px dashed #ffb6c1;
        }

        /* ===== МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ ===== */
        .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 182, 193, 0.5);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
            border: 1px solid #ffb6c1;
        }

        .modal-content h3 {
            margin-bottom: 25px;
            color: #d44e6c;
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            text-align: center;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 2px solid #ffe4e6;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
        }

        .modal-content input:focus,
        .modal-content select:focus {
            outline: none;
            border-color: #ff69b4;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .save-btn {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
        }

        .save-btn:hover {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            transform: translateY(-2px);
        }

        .cancel-btn {
            background: #ffe4e6;
            color: #d44e6c;
        }

        .cancel-btn:hover {
            background: #ffd9e2;
            transform: translateY(-2px);
        }

        /* ===== АДАПТИВНЫЙ ДИЗАЙН ===== */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .add-task-section {
                flex-direction: column;
            }
            
            .filters-section {
                flex-direction: column;
                align-items: stretch;
            }
            
            .task-meta {
                flex-direction: column;
                gap: 8px;
            }
            
            .task-actions {
                flex-direction: column;
            }
        }

        /* ===== ДОПОЛНИТЕЛЬНЫЕ РОЗОВЫЕ АКЦЕНТЫ ===== */
        ::selection {
            background: #ffb6c1;
            color: white;
        }
        
        ::-webkit-calendar-picker-indicator {
            filter: invert(0.7) sepia(1) saturate(5) hue-rotate(290deg);
        }
        
        /* Красивая полоса прокрутки */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #fff0f3;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #ffb6c1, #ff69b4);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌸 Менеджер задач</h1>
        
        <!-- ===== ФОРМА ДОБАВЛЕНИЯ НОВОЙ ЗАДАЧИ ===== -->
        <div class="add-task-section">
            <input type="text" id="new-task" placeholder="Что нужно сделать?">
            
            <select id="task-priority" class="priority-select">
                <option value="medium">Средний приоритет</option>
                <option value="high">Высокий приоритет</option>
                <option value="low">Низкий приоритет</option>
            </select>
            
            <input type="date" id="task-due-date" class="date-input">
            
            <button onclick="addTask()" class="add-btn">➕ Добавить</button>
        </div>

        <!-- ===== ПАНЕЛЬ ФИЛЬТРАЦИИ И СОРТИРОВКИ ===== -->
        <div class="filters-section">
            <div class="priority-filters">
                <button class="priority-filter-btn active" data-priority="all" onclick="filterTasks('all')">Все</button>
                <button class="priority-filter-btn" data-priority="high" onclick="filterTasks('high')">Высокий</button>
                <button class="priority-filter-btn" data-priority="medium" onclick="filterTasks('medium')">Средний</button>
                <button class="priority-filter-btn" data-priority="low" onclick="filterTasks('low')">Низкий</button>
            </div>
            
            <select id="sort-select" class="sort-select" onchange="changeSort()">
                <option value="priority-desc">Приоритет (сначала высокие)</option>
                <option value="priority-asc">Приоритет (сначала низкие)</option>
                <option value="due-date-asc">Срок (сначала ближайшие)</option>
                <option value="due-date-desc">Срок (сначала поздние)</option>
                <option value="title-asc">Название (А-Я)</option>
            </select>

            <div class="task-stats" id="task-stats">
                <span>Всего: <span id="total-tasks">0</span></span>
                <span>Выполнено: <span id="completed-tasks">0</span></span>
                <span>Просрочено: <span id="overdue-tasks">0</span></span>
            </div>
        </div>

        <ul id="task-list"></ul>
    </div>

    <!-- ===== МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ ===== -->
    <div id="edit-modal" class="edit-modal">
        <div class="modal-content">
            <h3>Редактировать задачу</h3>
            <input type="text" id="edit-title" placeholder="Название задачи">
            <select id="edit-priority">
                <option value="high">Высокий приоритет</option>
                <option value="medium">Средний приоритет</option>
                <option value="low">Низкий приоритет</option>
            </select>
            <input type="date" id="edit-due-date">
            <div class="modal-buttons">
                <button onclick="saveEdit()" class="modal-btn save-btn">Сохранить</button>
                <button onclick="closeEditModal()" class="modal-btn cancel-btn">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        // ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
        let currentFilter = 'all';
        let currentEditId = null;
        let tasks = [];

        // ===== ЗАГРУЗКА ЗАДАЧ С СЕРВЕРА =====
        async function fetchTasks() {
            try {
                const res = await fetch('/tasks');
                tasks = await res.json();
                displayTasks();
            } catch (error) {
                console.error('Ошибка загрузки задач:', error);
            }
        }

        // ===== ФОРМАТИРОВАНИЕ ДАТЫ =====
        function formatDate(dateString) {
            if (!dateString) return null;
            const date = new Date(dateString);
            return date.toLocaleDateString('ru-RU', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
        }

        // ===== ОПРЕДЕЛЕНИЕ СТАТУСА СРОКА =====
        function getDueDateStatus(dueDate) {
            if (!dueDate) return null;
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const taskDate = new Date(dueDate);
            taskDate.setHours(0, 0, 0, 0);
            
            const diffTime = taskDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays < 0) return 'overdue';
            if (diffDays === 0) return 'today';
            if (diffDays === 1) return 'tomorrow';
            return null;
        }

        // ===== ОТОБРАЖЕНИЕ ЗАДАЧ =====
        function displayTasks() {
            const list = document.getElementById('task-list');
            
            const filteredTasks = tasks.filter(task => {
                if (currentFilter === 'all') return true;
                return task.priority === currentFilter;
            });

            const sortBy = document.getElementById('sort-select').value;
            filteredTasks.sort((a, b) => {
                switch(sortBy) {
                    case 'priority-desc':
                        const priorityWeight = { high: 3, medium: 2, low: 1 };
                        return (priorityWeight[b.priority || 'medium'] || 0) - (priorityWeight[a.priority || 'medium'] || 0);
                    case 'priority-asc':
                        const priorityWeightAsc = { high: 3, medium: 2, low: 1 };
                        return (priorityWeightAsc[a.priority || 'medium'] || 0) - (priorityWeightAsc[b.priority || 'medium'] || 0);
                    case 'due-date-asc':
                        if (!a.dueDate) return 1;
                        if (!b.dueDate) return -1;
                        return new Date(a.dueDate) - new Date(b.dueDate);
                    case 'due-date-desc':
                        if (!a.dueDate) return 1;
                        if (!b.dueDate) return -1;
                        return new Date(b.dueDate) - new Date(a.dueDate);
                    case 'title-asc':
                        return (a.title || '').localeCompare(b.title || '', 'ru');
                    default:
                        return 0;
                }
            });

            list.innerHTML = '';
            
            const totalTasks = tasks.length;
            const completedTasks = tasks.filter(t => t.completed).length;
            const overdueTasks = tasks.filter(t => {
                if (!t.dueDate || t.completed) return false;
                return getDueDateStatus(t.dueDate) === 'overdue';
            }).length;
            
            document.getElementById('total-tasks').textContent = totalTasks;
            document.getElementById('completed-tasks').textContent = completedTasks;
            document.getElementById('overdue-tasks').textContent = overdueTasks;

            if (filteredTasks.length === 0) {
                list.innerHTML = '<li class="no-tasks">🌸 Здесь пока пусто... Добавьте новую задачу!</li>';
                return;
            }

            filteredTasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item priority-${task.priority || 'medium'}`;
                if (task.completed) li.classList.add('completed');

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'task-checkbox';
                checkbox.checked = task.completed;
                checkbox.onclick = async (e) => {
                    e.stopPropagation();
                    await toggleTask(task.id);
                    fetchTasks();
                };

                const contentDiv = document.createElement('div');
                contentDiv.className = 'task-content';

                const titleDiv = document.createElement('div');
                titleDiv.className = 'task-title';
                titleDiv.textContent = task.title;

                const metaDiv = document.createElement('div');
                metaDiv.className = 'task-meta';

                const prioritySpan = document.createElement('span');
                prioritySpan.className = `priority-badge ${task.priority || 'medium'}`;
                
                const priorityText = {
                    'high': 'Высокий',
                    'medium': 'Средний',
                    'low': 'Низкий'
                };
                prioritySpan.textContent = priorityText[task.priority || 'medium'];

                metaDiv.appendChild(prioritySpan);

                if (task.dueDate) {
                    const dueDateSpan = document.createElement('span');
                    const status = getDueDateStatus(task.dueDate);
                    dueDateSpan.className = `due-date ${status || ''}`;
                    
                    const dueDate = new Date(task.dueDate);
                    const formattedDate = dueDate.toLocaleDateString('ru-RU', { 
                        day: 'numeric',
                        month: 'long'
                    });
                    
                    let icon = '📅';
                    if (status === 'overdue') icon = '⚠️ Просрочено:';
                    else if (status === 'today') icon = '🔴 Сегодня:';
                    else if (status === 'tomorrow') icon = '🟡 Завтра:';
                    
                    dueDateSpan.innerHTML = `${icon} ${formattedDate}`;
                    metaDiv.appendChild(dueDateSpan);
                }

                contentDiv.appendChild(titleDiv);
                contentDiv.appendChild(metaDiv);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'task-actions';

                const editBtn = document.createElement('button');
                editBtn.className = 'task-btn edit-btn';
                editBtn.textContent = '✏️ Ред.';
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    openEditModal(task);
                };

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'task-btn delete-btn';
                deleteBtn.textContent = '🗑️ Удал.';
                deleteBtn.onclick = async (e) => {
                    e.stopPropagation();
                    if (confirm('Вы уверены, что хотите удалить эту задачу?')) {
                        await deleteTask(task.id);
                        fetchTasks();
                    }
                };

                actionsDiv.appendChild(editBtn);
                actionsDiv.appendChild(deleteBtn);

                li.appendChild(checkbox);
                li.appendChild(contentDiv);
                li.appendChild(actionsDiv);
                list.appendChild(li);
            });
        }

        // ===== ДОБАВЛЕНИЕ НОВОЙ ЗАДАЧИ =====
        async function addTask() {
            const input = document.getElementById('new-task');
            const priority = document.getElementById('task-priority').value;
            const dueDate = document.getElementById('task-due-date').value;
            
            if (!input.value.trim()) {
                alert('Пожалуйста, введите название задачи');
                return;
            }

            try {
                await fetch('/tasks', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({
                        title: input.value,
                        priority: priority,
                        dueDate: dueDate || null
                    })
                });
                
                input.value = '';
                document.getElementById('task-due-date').value = '';
                fetchTasks();
            } catch (error) {
                console.error('Ошибка при добавлении задачи:', error);
            }
        }

        // ===== ПЕРЕКЛЮЧЕНИЕ СТАТУСА ВЫПОЛНЕНИЯ =====
        async function toggleTask(id) {
            try {
                await fetch(`/tasks/${id}`, { method: 'PUT' });
            } catch (error) {
                console.error('Ошибка при изменении статуса:', error);
            }
        }

        // ===== УДАЛЕНИЕ ЗАДАЧИ =====
        async function deleteTask(id) {
            try {
                await fetch(`/tasks/${id}`, { method: 'DELETE' });
            } catch (error) {
                console.error('Ошибка при удалении задачи:', error);
            }
        }

        // ===== ФИЛЬТРАЦИЯ ПО ПРИОРИТЕТУ =====
        function filterTasks(priority) {
            currentFilter = priority;
            document.querySelectorAll('.priority-filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            displayTasks();
        }

        // ===== ИЗМЕНЕНИЕ СОРТИРОВКИ =====
        function changeSort() {
            displayTasks();
        }

        // ===== ОТКРЫТИЕ МОДАЛЬНОГО ОКНА =====
        function openEditModal(task) {
            currentEditId = task.id;
            document.getElementById('edit-title').value = task.title;
            document.getElementById('edit-priority').value = task.priority || 'medium';
            document.getElementById('edit-due-date').value = task.dueDate || '';
            document.getElementById('edit-modal').style.display = 'flex';
        }

        // ===== ЗАКРЫТИЕ МОДАЛЬНОГО ОКНА =====
        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
            currentEditId = null;
        }

        // ===== СОХРАНЕНИЕ ИЗМЕНЕНИЙ =====
        async function saveEdit() {
            if (!currentEditId) return;

            const title = document.getElementById('edit-title').value.trim();
            const priority = document.getElementById('edit-priority').value;
            const dueDate = document.getElementById('edit-due-date').value;

            if (!title) {
                alert('Пожалуйста, введите название задачи');
                return;
            }

            try {
                await fetch(`/tasks/${currentEditId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        priority: priority,
                        dueDate: dueDate || null
                    })
                });
                closeEditModal();
                fetchTasks();
            } catch (error) {
                console.error('Ошибка при обновлении задачи:', error);
            }
        }

        // ===== ЗАКРЫТИЕ МОДАЛЬНОГО ОКНА ПРИ КЛИКЕ ВНЕ ЕГО =====
        window.onclick = function(event) {
            const modal = document.getElementById('edit-modal');
            if (event.target === modal) {
                closeEditModal();
            }
        };

        // ===== ПЕРВОНАЧАЛЬНАЯ ЗАГРУЗКА =====
        fetchTasks();
    </script>
</body>
</html>
